<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UxS Command &amp; Control</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-armed="false">
<div class="shell">

    <!-- Header -->
    <nav class="header">
        <div class="header-left">
            <span class="sys-tag" id="sysTag">[ SYS:STANDBY ]</span>
            <h1>UxS Command &amp; Control</h1>
        </div>
        <div class="header-right">
            <div class="processing" id="processing">
                <div class="spinner"></div>
                <span>Processing...</span>
            </div>
            <button class="connect-btn" id="connectBtn" onclick="connectDrone()">CONNECT</button>
            <span class="timestamp" id="timestamp"></span>
        </div>
    </nav>

    <!-- Main 3-column layout -->
    <div class="main-layout">

        <!-- Left: Command Log -->
        <main class="command-log-panel">
            <div class="section-header">
                <span class="section-icon">&#9654;</span>
                <h2>Command Log</h2>
            </div>
            <div class="log-entries" id="logEntries">
                <div class="log-entry system">
                    <div class="log-time">SYSTEM</div>
                    <div class="log-text">UxS C2 ready. Awaiting connection.</div>
                </div>
            </div>
        </main>

        <!-- Centre: Tactical Map -->
        <section class="map-section">
            <div class="section-header">
                <span class="section-icon">&#9654;</span>
                <h2>Tactical Map // ENU</h2>
            </div>
            <div class="map-container">
                <canvas id="mapCanvas"></canvas>

                <!-- Zoom controls -->
                <div class="zoom-controls">
                    <button onclick="adjustZoom(0.15)" title="Zoom in">+</button>
                    <button onclick="resetZoom()" id="zoomLabel" title="Reset zoom">100%</button>
                    <button onclick="adjustZoom(-0.15)" title="Zoom out">&#8722;</button>
                </div>

                <!-- Legend -->
                <div class="map-legend">
                    <div class="legend-item">
                        <div class="legend-dot" style="background:#22c55e;"></div>
                        <span>Alpha</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background:#ef4444;"></div>
                        <span>No Fly</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background:#f59e0b;"></div>
                        <span>Waypoint</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background:#3b82f6;opacity:0.5;"></div>
                        <span>Trail</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right: Drone Status Sidebar -->
        <aside class="status-sidebar">
            <div class="section-header">
                <span class="section-icon">&#9654;</span>
                <h2>Drone Status</h2>
            </div>

            <!-- UxS-ALPHA panel -->
            <div class="drone-panel">
                <div class="drone-panel-header">
                    <span class="drone-label">&#9632; UxS-ALPHA</span>
                    <div class="drone-badges">
                        <span class="badge" id="badgeConnected">DISCONNECTED</span>
                    </div>
                </div>
                <div class="status-item">
                    <span class="label">Mode</span>
                    <span class="value" id="sMode">—</span>
                </div>
                <div class="status-item">
                    <span class="label">Alt</span>
                    <span class="value" id="sAlt">—</span>
                </div>
                <div class="status-item">
                    <span class="label">Pos X</span>
                    <span class="value" id="sPosX">—</span>
                </div>
                <div class="status-item">
                    <span class="label">Pos Y</span>
                    <span class="value" id="sPosY">—</span>
                </div>
                <div class="status-item">
                    <span class="label">Hdg</span>
                    <span class="value" id="sHeading">—</span>
                </div>
                <div class="status-item">
                    <span class="label">Bat</span>
                    <span class="value" id="sBattery">—</span>
                </div>
                <div class="status-item">
                    <span class="label">GPS</span>
                    <span class="value" id="sGPS">—</span>
                </div>
                <div class="status-item">
                    <span class="label">Callsign</span>
                    <span class="value" id="sDroneId">ALPHA</span>
                </div>
                <!-- Keep sArmed hidden — app.js updates its className, badge handles display -->
                <span id="sArmed" style="display:none;">—</span>
            </div>
        </aside>

    </div><!-- /main-layout -->

    <!-- Bottom: CMD bar -->
    <div class="cmd-bar">
        <span class="cmd-prefix">CMD&gt;</span>
        <button class="mic-btn" id="micBtn" title="Hold to talk (or hold Space)">&#9679;</button>
        <span class="transcript-display" id="transcript"></span>
        <input type="text" class="text-input" id="textInput"
               placeholder="Type command and press Enter or Send..."
               autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="sendTextCommand()">Send</button>
    </div>

</div><!-- /shell -->
<script src="/static/app.js"></script>
</body>
</html>
